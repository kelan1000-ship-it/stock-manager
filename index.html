
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                900: '#1e293b',
                950: '#0f172a',
              }
            },
            animation: {
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            },
            keyframes: {
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom Tag Flashing Animation */
        @keyframes tag-flash {
          0%, 100% { 
            filter: brightness(1);
            transform: scale(1);
          }
          50% { 
            filter: brightness(1.4);
            transform: scale(1.05);
          }
        }

        .animate-tag-flash {
          animation: tag-flash 1.5s infinite ease-in-out;
          display: inline-block;
        }

        /* High-tech AI Glow Animation */
        @keyframes ai-glow-pulse {
          0%, 100% { 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2), 0 0 5px rgba(99, 102, 241, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
          }
          50% { 
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4), 0 0 15px rgba(99, 102, 241, 0.3);
            border-color: rgba(16, 185, 129, 0.5);
          }
        }

        .animate-ai-glow {
          animation: ai-glow-pulse 4s infinite ease-in-out;
        }

        /* Rotating Border Pulsar Animation */
        @keyframes rotate-border {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        .ai-pulse-light {
          position: relative;
          z-index: 0;
          overflow: hidden;
          background: transparent !important;
          border: none !important; /* Clear existing borders */
          color: rgba(255, 255, 255, 0.95) !important;
          box-shadow: 0 0 25px rgba(99, 102, 241, 0.15) !important;
        }

        /* The rotating beam */
        .ai-pulse-light::before {
          content: "";
          position: absolute;
          z-index: -2;
          left: -50%;
          top: -50%;
          width: 200%;
          height: 200%;
          background-repeat: no-repeat;
          background-position: 0 0;
          background-image: conic-gradient(
            transparent, 
            rgba(99, 102, 241, 0.1), 
            rgba(168, 85, 247, 0.4), 
            #a855f7, 
            #ffffff,
            #a855f7,
            rgba(168, 85, 247, 0.4), 
            rgba(99, 102, 241, 0.1), 
            transparent 50%
          );
          animation: rotate-border 2s linear infinite;
        }

        /* The inner button background */
        .ai-pulse-light::after {
          content: "";
          position: absolute;
          z-index: -1;
          inset: 2px; /* Border thickness */
          background: rgba(15, 23, 42, 0.98);
          border-radius: inherit;
        }
        
        /* Ensure content sits above the light */
        .ai-pulse-light > * {
            position: relative;
            z-index: 2;
        }

        /* AI Processing Pulsar Light (Legacy - keeping for fallback) */
        @keyframes pulsar-travel {
          0% {
            transform: translateX(-100%) skewX(-15deg);
          }
          100% {
            transform: translateX(200%) skewX(-15deg);
          }
        }

        .processing-pulsar {
          position: relative;
          overflow: hidden;
        }

        .processing-pulsar::after {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          width: 50%;
          height: 100%;
          background: linear-gradient(
            90deg,
            transparent 0%,
            rgba(255, 255, 255, 0.1) 30%,
            rgba(255, 255, 255, 0.5) 50%,
            rgba(255, 255, 255, 0.1) 70%,
            transparent 100%
          );
          filter: blur(2px);
          animation: pulsar-travel 1.5s infinite linear;
          pointer-events: none;
          z-index: 10;
        }

        /* Traveling border pulse animation */
        @keyframes border-spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        .animate-border-spin {
          animation: border-spin 2s linear infinite;
        }

        /* Hide scrollbar but allow scrolling */
        .scrollbar-hide::-webkit-scrollbar {
          display: none;
        }
        .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }

        /* Custom pulsing for pharmacy alerts */
        .pulse {
          animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
          0% {
            transform: scale(0.33);
          }
          80%, 100% {
            opacity: 0;
          }
        }
        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
        input[type="number"] {
          -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
